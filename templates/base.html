{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYUNDAI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            padding-top: 110px;
            background-color: #f8f9fa;
        }

        .top-sub-nav {
            background-color: #f0eceb;
            font-size: 0.85rem;
            padding: 5px 0;
        }

        .navbar-custom {
            background-color: #ffffff !important;
            border-bottom: 1px solid #e5e5e5;
            min-height: 80px;
        }

        .nav-link {
            color: #000 !important;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .btn-hyundai {
            background-color: #e4dcd9;
            border: none;
            color: #000;
            border-radius: 0;
            padding: 10px 20px;
        }
    </style>
</head>
<body>

    <header class="fixed-top">
        <div class="top-sub-nav d-none d-lg-block">
            <div class="container d-flex justify-content-end align-items-center gap-4">
                <span><i class="bi bi-telephone"></i> 0 800 507 555</span>
                <a href="{% url 'service' %}" class="text-decoration-none text-dark">Запис на сервіс</a>
                <a href="{% url 'test_drive_select' %}" class="text-decoration-none text-dark">Тест-Драйв</a>
                <a href="#" class="text-decoration-none text-dark">Контакти</a>
                <a href="#" class="text-decoration-none text-dark">Про Нас</a>
            </div>
        </div>
        <nav class="navbar navbar-expand-lg navbar-custom">
            <div class="container">
                <a class="navbar-brand" href="/">
                   <img src="{% static 'images/logo.svg' %}" alt="Hyundai Logo" height="30">
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item"><a class="nav-link px-3" href="#">Модельний ряд</a></li>
                        <li class="nav-item"><a class="nav-link px-3" href="#">Сервіс та послуги</a></li>
                        <li class="nav-item"><a class="nav-link px-3" href="#">Спецпропозиції</a></li>
                        <li class="nav-item"><a class="nav-link px-3" href="#">Trade-in</a></li>
                    </ul>

                    <div class="d-flex align-items-center gap-2">
                        {% if user.is_authenticated %}
                            <span class="small me-2"><strong>{{ user.username }}</strong></span>
                            <form action="{% url 'logout' %}" method="post" class="m-0">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-sm btn-outline-dark">Вихід</button>
                            </form>
                        {% else %}
                            <a href="{% url 'login' %}" class="btn btn-sm text-dark px-3">Вхід</a>
                            <a href="{% url 'register' %}" class="btn btn-hyundai">Реєстрація</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="py-4">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
