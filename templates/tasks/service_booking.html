{% extends "base.html" %}

{% block content %}
<div class="container py-5 mt-5">

    <div class="d-flex justify-content-center align-items-center mb-5">
        <div class="text-primary fw-bold">
            <span class="badge bg-primary rounded-circle me-2">1</span> Ввід даних
        </div>

        <div style="width: 70px; height: 2px; background: #e0e0e0; margin: 0 20px;"></div>

        <div class="text-muted">
            <span class="badge bg-secondary rounded-circle me-2">2</span> Відправка заявки
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border p-4 bg-light" style="border-radius: 15px;">
                <h3 class="text-center mb-4 text-uppercase fw-bold" style="color: #002c5f;">Запис на сервіс</h3>

                <form method="post">
                    {% csrf_token %}

                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-secondary">{{ field.label }}:</label>
                            <div class="form-control-wrapper">
                                {{ field }}
                            </div>
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <button type="submit" class="btn w-100 py-3 fw-bold text-uppercase text-white shadow-sm mt-3" style="background-color: #002c5f; border-radius: 10px;">
                        ЗАПИСАТИСЯ
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    form input, form select, form textarea {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        background-clip: padding-box;
        border: 1px solid #ced4da;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        border-radius: 10px;
        transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
    }
    form input:focus, form select:focus, form textarea:focus {
        color: #212529;
        background-color: #fff;
        border-color: #86b7fe;
        outline: 0;
        box-shadow: 0 0 0 .25rem rgba(13,110,253,.25);
    }
</style>
{% endblock %}
