{% extends "base.html" %}
{% block content %}
<div class="container py-5 mt-5">

    <div class="d-flex justify-content-center align-items-center mb-5">
        <div class="text-success fw-bold"><span class="badge bg-success rounded-circle me-2">✓</span> Вибір авто</div>
        <div style="width: 50px; height: 2px; background: #002c5f; margin: 0 15px;"></div>
        <div class="text-primary fw-bold"><span class="badge bg-primary rounded-circle me-2">2</span> Ввід даних</div>
        <div style="width: 50px; height: 2px; background: #e0e0e0; margin: 0 15px;"></div>
        <div class="text-muted"><span class="badge bg-secondary rounded-circle me-2">3</span> Відправка заявки</div>
    </div>

    <div class="row justify-content-center text-center mb-4">
        <div class="col-md-6">
            <img src="{{ selected_car.image.url }}" alt="{{ selected_car.model_name }}" class="img-fluid mb-2" style="max-height: 250px; object-fit: contain;">
            <h2 class="fw-bold text-uppercase" style="color: #002c5f;">{{ selected_car.model_name }}</h2>
            <a href="{% url 'test_drive_select' %}" class="btn btn-sm btn-outline-secondary px-4 mt-2">Обрати інший автомобіль</a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6 bg-light p-4 rounded shadow-sm border">
            <h6 class="fw-bold mb-4 text-secondary text-uppercase">Введіть, будь ласка, контактні дані:</h6>

                        <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Ваше Ім'я: <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" placeholder="Ірина" required style="border-radius: 15px;">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Прізвище: <span class="text-danger">*</span></label>
                    <input type="text" name="last_name" class="form-control" placeholder="Давиденко" required style="border-radius: 15px;">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Номер телефона: <span class="text-danger">*</span></label>
                    <input type="text" name="phone" class="form-control" placeholder="+380667171831" required style="border-radius: 15px;">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Дата та час тест-драйву: <span class="text-danger">*</span></label>
                    <input type="datetime-local" name="date" class="form-control" required style="border-radius: 15px;">
                </div>

                <button type="submit" class="btn w-100 py-3 fw-bold text-uppercase text-white" style="background-color: #002c5f; border-radius: 10px;">
                    Відтворити заявку
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
