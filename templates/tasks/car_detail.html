{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="position-relative overflow-hidden text-center bg-dark text-white d-flex align-items-center" style="height: 60vh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7));">
    <div class="container position-relative" style="z-index: 2;">
        <h1 class="display-2 fw-bold text-uppercase tracking-wider mb-2">{{ car_name }}</h1>
        <p class="lead fs-4 text-white-50 text-uppercase">Відчуйте досконалість у кожній деталі</p>
    </div>
    <div class="position-absolute top-0 start-0 w-100 h-100" style="background: url('{% static 'images/' %}{{ car_img_name }}.png') center/cover no-repeat; filter: brightness(45%); z-index: 1;"></div>
</div>

<div class="container py-5">
    <div class="row justify-content-center mb-5 text-center">
        <div class="col-lg-8">
            <h2 class="text-uppercase fw-bold mb-4" style="color: #002c5f;">Про модель</h2>
            <p class="fs-5 text-muted lh-base">
                {{ car_description }}
            </p>
        </div>
    </div>

    <h3 class="text-center text-uppercase fw-bold mb-4" style="color: #002c5f;">Галерея моделі</h3>
    <div class="row g-3 mb-5">
        <div class="col-md-6 col-lg-7">
            <div class="card border-0 shadow-sm overflow-hidden h-100" style="border-radius: 15px;">
                <img src="{% static 'images/' %}{{ car_img_name }}_1.jpg" class="img-fluid w-100 h-100" style="object-fit: cover; min-height: 300px;" alt="{{ car_name }} екстер'єр">
            </div>
        </div>
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm overflow-hidden h-100" style="border-radius: 15px;">
                <img src="{% static 'images/' %}{{ car_img_name }}_2.jpg" class="img-fluid w-100 h-100" style="object-fit: cover; min-height: 300px;" alt="{{ car_name }} інтер'єр">
            </div>
        </div>
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm overflow-hidden h-100" style="border-radius: 15px;">
                <img src="{% static 'images/' %}{{ car_img_name }}_3.jpg" class="img-fluid w-100 h-100" style="object-fit: cover; min-height: 250px;" alt="{{ car_name }} деталі">
            </div>
        </div>
        <div class="col-md-6 col-lg-7">
            <div class="card border-0 shadow-sm overflow-hidden h-100" style="border-radius: 15px;">
                <img src="{% static 'images/' %}{{ car_img_name }}_4.jpg" class="img-fluid w-100 h-100" style="object-fit: cover; min-height: 250px;" alt="{{ car_name }} в русі">
            </div>
        </div>
    </div>


      <div class="d-flex justify-content-center my-4">
    <a href="{% url 'test_drive_select' %}" class="btn px-5 py-3 fw-bold text-uppercase text-white shadow" style="background-color: #00aad2; border-radius: 10px;">
        <i class="bi bi-steering me-2"></i> Замовити Тест-Драйв
    </a>
</div>
    </div>
</div>
{% endblock %}
