{% extends "base.html" %}
{% block content %}
<div class="container py-5 mt-5">

    <div class="d-flex justify-content-center align-items-center mb-5">
        <div class="text-primary fw-bold"><span class="badge bg-primary rounded-circle me-2">1</span> Вибір авто</div>
        <div style="width: 50px; height: 2px; background: #e0e0e0; margin: 0 15px;"></div>
        <div class="text-muted"><span class="badge bg-secondary rounded-circle me-2">2</span> Ввід даних</div>
        <div style="width: 50px; height: 2px; background: #e0e0e0; margin: 0 15px;"></div>
        <div class="text-muted"><span class="badge bg-secondary rounded-circle me-2">3</span> Відправка заявки</div>
    </div>

    <div class="row g-4 justify-content-center">
        {% for car in cars %}
        <div class="col-6 col-md-4 col-lg-3 text-center">
            <a href="{% url 'book_test_drive' car.id %}" class="text-decoration-none text-dark">
                <div class="card border-0 p-3 h-100 shadow-sm" style="transition: 0.3s;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
                    <img src="{{ car.image.url }}" alt="{{ car.model_name }}" class="img-fluid" style="max-height: 120px; object-fit: contain;">
                    <h5 class="mt-3 fw-bold text-uppercase" style="letter-spacing: 0.5px;">{{ car.model_name }}</h5>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
